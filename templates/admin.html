<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Goal Striver Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/fullscreen.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/fullscreen.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-tag">Management</span>
        <h1>Edit Problem</h1>
      </div>
      <div class="topbar-right">
        <span class="username-chip">👤 {{ username }}</span>
        <a href="/admin/reorder" class="nav-btn nav-btn--ghost">Reorder</a>
        <a href="/" class="nav-btn nav-btn--ghost">Practice</a>
        <a href="/logout" class="nav-btn nav-btn--ghost">Logout</a>
      </div>
    </header>

    <main class="admin-page">
      <form id="adminForm" class="admin-form">
        <input type="hidden" name="id">
        <label>Step (Locked) <input name="step" readonly style="opacity: 0.6; cursor: not-allowed;"></label>
        <label>Lecture (Locked) <input name="lecture" readonly style="opacity: 0.6; cursor: not-allowed;"></label>
        <label>Problem title <input name="title" required></label>
        <label>Difficulty 
          <select name="difficulty">
            <option value="">Select Difficulty</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </label>
        <label>Article URL <input name="article" type="url"></label>
        <label>YouTube URL <input name="youtube" type="url"></label>
        <div class="dynamic-urls">
          <label>Practice Links</label>
          <div id="urlList"></div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
          <label style="margin-bottom: 0;">Notes</label>
          <button type="button" id="maximizeAdminNoteBtn" class="nav-btn nav-btn--ghost" style="padding: 2px 8px;">⛶ Fullscreen</button>
        </div>
        <textarea name="notes" id="adminNotes" rows="6"></textarea>
        <div class="checks">
          <label><input name="done" type="checkbox"> Done</label>
          <label><input name="revision" type="checkbox"> Revision</label>
        </div>
        <div class="admin-actions">
          <button type="submit" id="submitBtn">Save Changes</button>
          <button type="button" id="deleteBtn" style="display: none;">Delete problem</button>
        </div>
        <p id="adminMessage" class="muted"></p>
      </form>
    </main>

    <script>
    var currentUser = "{{ username }}";
  </script>
  <script src="/static/admin.js"></script>
  </body>
</html>
