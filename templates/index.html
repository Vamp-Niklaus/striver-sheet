<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal Striver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-tag">Striver A2Z Tracker</span>
      <h1>Goal Striver</h1>
    </div>
    <div class="topbar-right">
      <span class="username-chip">👤 {{ username }}</span>
      <a href="/admin/reorder" class="nav-btn">Admin</a>
      <a href="/logout" class="nav-btn nav-btn--ghost">Logout</a>
    </div>
  </header>

  <main>
    <!-- Filters Toolbar -->
    <div class="toolbar" id="toolbar">
      <input id="search" type="search" placeholder="🔍  Search problems, notes…">
      <select id="stepFilter"><option value="">All Steps</option></select>
      <select id="difficultyFilter"><option value="">All Difficulty</option></select>
      <select id="statusFilter">
        <option value="">All Status</option>
        <option value="done">Done</option>
        <option value="pending">Pending</option>
      </select>
      <select id="revisionFilter">
        <option value="">All Revision</option>
        <option value="revision">Revision Only</option>
        <option value="not-revision">No Revision</option>
      </select>
      <select id="linkFilter">
        <option value="">All Practice</option>
        <option value="tuf">Has TUF+</option>
        <option value="naukri">Has Naukri</option>
        <option value="leetcode">Has LeetCode</option>
        <option value="gfg">Has GFG</option>
        <option value="other">Has Other</option>
      </select>
      <button id="resetFilters" class="nav-btn nav-btn--ghost" style="padding: 9px 14px; font-size: 13px;">Reset</button>
    </div>

    <!-- Summary bar -->
    <div class="summary-bar" id="summary"></div>

    <!-- Problems accordion area -->
    <div id="accordionRoot"></div>
  </main>

  <!-- Note dialog -->
  <dialog id="noteDialog">
    <form method="dialog">
      <div class="dialog-head">
        <strong id="noteTitle">Notes</strong>
        <button value="cancel" class="dialog-close">✕</button>
      </div>
      <textarea id="noteText" rows="14" placeholder="Write your notes here…"></textarea>
      <div class="dialog-actions">
        <button id="saveNote" type="button">Save Note</button>
      </div>
    </form>
  </dialog>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
