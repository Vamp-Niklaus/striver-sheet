<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reorder Hierarchy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <!-- CodeMirror -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/fullscreen.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/fullscreen.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0d0f13; color: #e4e4e7; margin: 0; padding: 24px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    h1 { margin: 0; font-size: 24px; color: #fff; }
    .save-btn { background: #ee4c2b; color: white; padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: 'Inter'; }
    .save-btn:hover { background: #ff5e3a; }
    .add-btn { background: transparent; border: 1px dashed #3b3f4a; color: #a1a1aa; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; text-align: left; font-size: 14px; margin-top: 12px; }
    .add-btn:hover { background: #181a20; color: #fff; border-color: #71717a; }
    .back-btn { color: #a1a1aa; text-decoration: none; padding: 10px; font-weight: 500; }
    .back-btn:hover { color: #fff; }
    
    .breadcrumbs { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; font-size: 14px; color: #a1a1aa; background: #181a20; padding: 12px 16px; border-radius: 8px; border: 1px solid #2c303a; }
    .crumb { cursor: pointer; color: #e4e4e7; }
    .crumb:hover { color: #ee4c2b; text-decoration: underline; }
    .crumb-divider { color: #71717a; }
    
    .list-group { min-height: 20px; }
    .list-item { background: #181a20; border: 1px solid #2c303a; border-radius: 8px; margin-bottom: 8px; padding: 14px 16px; display: flex; align-items: center; cursor: pointer; font-size: 15px; font-weight: 500; }
    .list-item:hover { background: #20222a; border-color: #3b3f4a; }
    .drag-handle { cursor: grab; color: #71717a; margin-right: 12px; font-size: 16px; display: flex; align-items: center; }
    .drag-handle::before { content: "⋮⋮"; letter-spacing: -2px; }
    .item-icon { margin-right: 12px; font-size: 18px; }
    .item-content { flex-grow: 1; }
    
    .sortable-ghost { opacity: 0.4; }
    .sortable-drag { background: #ee4c2b !important; border-color: #ff5e3a !important; color: white !important; }
    .sortable-drag .drag-handle, .sortable-drag .item-icon { color: white !important; }
    .sortable-drag .drag-handle, .sortable-drag .item-icon { color: white !important; }
    
    /* Modal Styles */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #181a20; border: 1px solid #3b3f4a; border-radius: 12px; width: 400px; max-width: 90%; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .modal-content h2 { margin-top: 0; margin-bottom: 20px; font-size: 20px; color: #fff; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #a1a1aa; margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; background: #0d0f13; border: 1px solid #3b3f4a; color: #fff; padding: 10px 12px; border-radius: 6px; font-family: 'Inter'; box-sizing: border-box; }
    .form-group input:disabled { opacity: 0.6; cursor: not-allowed; }
    .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    .btn-cancel { background: transparent; color: #a1a1aa; border: none; cursor: pointer; padding: 10px 16px; font-family: 'Inter'; font-weight: 500; }
    .btn-cancel:hover { color: #fff; }
    .btn-submit { background: #ee4c2b; color: white; padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: 'Inter'; }
    .btn-submit:hover { background: #ff5e3a; }
  </style>
</head>
<body>

  <header>
    <div>
      <a href="/admin" class="back-btn">← Back to Admin</a>
      <h1 style="display:inline-block; margin-left: 16px;">Reorder Problems</h1>
    </div>
    <div>
      <span id="statusMessage" style="margin-right: 16px; color: #10b981;"></span>
      <button class="save-btn" onclick="saveOrder()">Save New Order</button>
    </div>
  </header>
  
  <div class="breadcrumbs" id="breadcrumbs">
    <!-- Populated by JS -->
  </div>

  <div id="reorder-root" class="list-group">
    <p style="color:#71717a;">Loading...</p>
  </div>
  
  <button id="addBtn" class="add-btn" style="display: none;" onclick="openAddModal()"></button>

  <!-- Quick Add Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal-content" style="max-height: 90vh; overflow-y: auto; width: 50vw; min-width: 500px; max-width: 800px;">
      <h2 id="modalTitle">Quick Add</h2>
      
      <div id="stepField" class="form-group">
        <label>Section Name (Step)</label>
        <input type="text" id="modalStep" placeholder="e.g. Step 1 : Basics">
      </div>
      
      <div id="lectureField" class="form-group">
        <label>Subsection Name (Lecture)</label>
        <input type="text" id="modalLecture" placeholder="e.g. Lec 1: Introduction">
      </div>
      
      <div id="problemFields">
        <div class="form-group">
          <label>Problem Title</label>
          <input type="text" id="modalTitleInput" placeholder="Problem Name">
        </div>
        <div class="form-group">
          <label>Difficulty</label>
          <select id="modalDifficulty">
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </div>
        <div class="form-group">
          <label>Article URL</label>
          <input type="text" id="modalArticle" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>YouTube URL</label>
          <input type="text" id="modalYoutube" placeholder="https://youtube.com/...">
        </div>
        
        <div class="dynamic-urls">
          <label>Practice Links</label>
          <div id="modalPracticeLinks"></div>
        </div>

        <div class="form-group">
          <label>Notes</label>
          <textarea id="modalNotes" rows="3" style="width: 100%; background: #0d0f13; border: 1px solid #3b3f4a; color: #fff; padding: 10px; border-radius: 6px; font-family: 'Inter';"></textarea>
        </div>
      </div>
      
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
        <button class="btn-submit" onclick="submitQuickAdd()" id="modalSubmitBtn">Save</button>
      </div>
    </div>
  </div>

  <script>
    let tree = [];
    let currentStepIndex = null;
    let currentLectureIndex = null;
    let sortableInstance = null;
    let modalNotesMirror = null;

    document.addEventListener("DOMContentLoaded", () => {
      modalNotesMirror = CodeMirror.fromTextArea(document.getElementById("modalNotes"), {
        mode: "javascript",
        theme: "dracula",
        lineNumbers: true,
        autoCloseBrackets: true,
        matchBrackets: true,
        indentUnit: 4,
        viewportMargin: Infinity
      });
    });

    async function loadData() {
      const res = await fetch('/api/problems');
      const data = await res.json();
      buildTree(data.problems || []);
      render();
    }

    function buildTree(flatProblems) {
      tree = [];
      const stepMap = {};
      
      for (const p of flatProblems) {
        if (!stepMap[p.step]) {
          const stepObj = { name: p.step, lectures: [], lecMap: {} };
          tree.push(stepObj);
          stepMap[p.step] = stepObj;
        }
        const s = stepMap[p.step];
        
        if (p.lecture !== "___STUB___") {
          if (!s.lecMap[p.lecture]) {
            const lecObj = { name: p.lecture, problems: [] };
            s.lectures.push(lecObj);
            s.lecMap[p.lecture] = lecObj;
          }
          const l = s.lecMap[p.lecture];
          
          if (p.title !== "___STUB___") {
            l.problems.push(p);
          }
        }
      }
    }

    function renderBreadcrumbs() {
      const bc = document.getElementById('breadcrumbs');
      let html = `<span class="crumb" onclick="goToRoot()">🏠 Home</span>`;
      
      if (currentStepIndex !== null) {
        const sName = tree[currentStepIndex].name;
        html += `<span class="crumb-divider">/</span><span class="crumb" onclick="goToStep(${currentStepIndex})">📁 ${escHtml(sName)}</span>`;
      }
      if (currentLectureIndex !== null) {
        const lName = tree[currentStepIndex].lectures[currentLectureIndex].name;
        html += `<span class="crumb-divider">/</span><span style="color:#e4e4e7;">📁 ${escHtml(lName)}</span>`;
      }
      
      bc.innerHTML = html;
    }

    function goToRoot() {
      currentStepIndex = null;
      currentLectureIndex = null;
      render();
    }

    function goToStep(sIdx) {
      currentStepIndex = sIdx;
      currentLectureIndex = null;
      render();
    }

    function goToLecture(sIdx, lIdx) {
      currentStepIndex = sIdx;
      currentLectureIndex = lIdx;
      render();
    }
    function addPracticeLinkRow(val = "") {
      const container = document.getElementById('modalPracticeLinks');
      const row = document.createElement("div");
      row.className = "url-row";
      
      const inp = document.createElement("input");
      inp.type = "url";
      inp.className = "url-input";
      inp.value = val;
      inp.placeholder = "https://...";
      
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "remove-url";
      btn.textContent = "✕";
      
      btn.onclick = () => {
        if (container.children.length > 1) {
          row.remove();
        } else {
          inp.value = "";
        }
      };
      
      inp.addEventListener("input", () => {
        if (row === container.lastElementChild && inp.value.trim() !== "") {
          addPracticeLinkRow("");
        }
      });
      
      row.appendChild(inp);
      row.appendChild(btn);
      container.appendChild(row);
    }

    function openAddModal() {
      const modal = document.getElementById('addModal');
      const stepInput = document.getElementById('modalStep');
      const lecInput = document.getElementById('modalLecture');
      const titleInput = document.getElementById('modalTitleInput');
      const diffInput = document.getElementById('modalDifficulty');
      const articleInput = document.getElementById('modalArticle');
      const youtubeInput = document.getElementById('modalYoutube');
      const notesInput = document.getElementById('modalNotes');
      const practiceContainer = document.getElementById('modalPracticeLinks');
      
      const stepField = document.getElementById('stepField');
      const lecField = document.getElementById('lectureField');
      const probFields = document.getElementById('problemFields');
      const modalTitle = document.getElementById('modalTitle');
      
      // Reset fields
      stepInput.value = '';
      lecInput.value = '';
      titleInput.value = '';
      diffInput.value = 'Easy';
      articleInput.value = '';
      youtubeInput.value = '';
      
      if (modalNotesMirror) {
        modalNotesMirror.setValue('');
        modalNotesMirror.setOption("fullScreen", false);
      }
      
      practiceContainer.innerHTML = '';
      addPracticeLinkRow(); // Add one default row

      if (currentStepIndex === null) {
        modalTitle.textContent = "Add New Section";
        stepField.style.display = "block";
        lecField.style.display = "none";
        probFields.style.display = "none";
      } else if (currentLectureIndex === null) {
        modalTitle.textContent = "Add New Subsection";
        stepField.style.display = "none";
        lecField.style.display = "block";
        probFields.style.display = "none";
      } else {
        modalTitle.textContent = "Add New Problem";
        stepField.style.display = "none";
        lecField.style.display = "none";
        probFields.style.display = "block";
      }
      
      modal.classList.add('active');
      
      if (modalNotesMirror) {
        setTimeout(() => modalNotesMirror.refresh(), 50);
      }
      
      // Auto-focus
      if (currentStepIndex === null) stepInput.focus();
      else if (currentLectureIndex === null) lecInput.focus();
      else titleInput.focus();
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('active');
    }

    // Close modal on backdrop click
    document.getElementById('addModal').addEventListener('click', (e) => {
      if (e.target.id === 'addModal') {
        closeAddModal();
      }
    });

    async function submitQuickAdd() {
      const btn = document.getElementById('modalSubmitBtn');
      
      let payload = {
        step: "",
        lecture: "",
        title: "___STUB___",
        difficulty: "Easy",
        article: "",
        youtube: "",
        notes: "",
        done: false,
        revision: false,
        practice: { tuf: [], naukri: [], leetcode: [], gfg: [], other: [] }
      };

      if (currentStepIndex === null) {
        // Adding a Step Stub
        const stepVal = document.getElementById('modalStep').value.trim();
        if (!stepVal) return alert("Please enter Section Name");
        payload.step = stepVal;
        payload.lecture = "___STUB___";
      } else if (currentLectureIndex === null) {
        // Adding a Lecture Stub
        const lecVal = document.getElementById('modalLecture').value.trim();
        if (!lecVal) return alert("Please enter Subsection Name");
        payload.step = tree[currentStepIndex].name;
        payload.lecture = lecVal;
      } else {
        // Adding a real Problem
        const titleVal = document.getElementById('modalTitleInput').value.trim();
        if (!titleVal) return alert("Please enter Problem Title");
        
        payload.step = tree[currentStepIndex].name;
        payload.lecture = tree[currentStepIndex].lectures[currentLectureIndex].name;
        payload.title = titleVal;
        payload.difficulty = document.getElementById('modalDifficulty').value;
        payload.article = document.getElementById('modalArticle').value.trim();
        payload.youtube = document.getElementById('modalYoutube').value.trim();
        payload.notes = modalNotesMirror ? modalNotesMirror.getValue() : document.getElementById('modalNotes').value.trim();
        
        // Parse practice links
        const allUrls = Array.from(document.getElementById('modalPracticeLinks').querySelectorAll('.url-input'))
          .map((inp) => inp.value.trim())
          .filter((u) => u);
          
        allUrls.forEach((u) => {
          const lower = u.toLowerCase();
          if (lower.includes('takeuforward.org')) payload.practice.tuf.push(u);
          else if (lower.includes('naukri.com') || lower.includes('codingninjas.com')) payload.practice.naukri.push(u);
          else if (lower.includes('leetcode.com')) payload.practice.leetcode.push(u);
          else if (lower.includes('geeksforgeeks.org')) payload.practice.gfg.push(u);
          else payload.practice.other.push(u);
        });
      }
      
      btn.disabled = true;
      btn.textContent = "Saving...";
      
      try {
        const res = await fetch('/api/problems', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (res.ok) {
          closeAddModal();
          await loadData();
        } else {
          const data = await res.json();
          alert("Error: " + (data.error || "Failed to add problem"));
        }
      } catch (err) {
        alert("Error saving problem.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Save";
      }
    }

    function render() {
      renderBreadcrumbs();
      const root = document.getElementById('reorder-root');
      const addBtn = document.getElementById('addBtn');
      let html = '';
      
      if (sortableInstance) {
        sortableInstance.destroy();
      }

      if (currentStepIndex === null) {
        // Render Steps
        tree.forEach((s, idx) => {
          html += `<div class="list-item" data-idx="${idx}">
            <div class="drag-handle"></div>
            <div class="item-icon">📁</div>
            <div class="item-content" onclick="goToStep(${idx})">${escHtml(s.name)} <span style="color:#71717a; font-size:12px; margin-left:8px;">(${s.lectures.length} subsections)</span></div>
          </div>`;
        });
        addBtn.textContent = "+ Add new Section (Step)";
        addBtn.style.display = "block";
        
      } else if (currentLectureIndex === null) {
        // Render Lectures
        const s = tree[currentStepIndex];
        s.lectures.forEach((l, idx) => {
          html += `<div class="list-item" data-idx="${idx}">
            <div class="drag-handle"></div>
            <div class="item-icon">📁</div>
            <div class="item-content" onclick="goToLecture(${currentStepIndex}, ${idx})">${escHtml(l.name)} <span style="color:#71717a; font-size:12px; margin-left:8px;">(${l.problems.length} problems)</span></div>
          </div>`;
        });
        addBtn.textContent = "+ Add new Subsection (Lecture)";
        addBtn.style.display = "block";
        
      } else {
        // Render Problems
        const l = tree[currentStepIndex].lectures[currentLectureIndex];
        l.problems.forEach(p => {
          html += `<div class="list-item" style="padding-left: 20px;">
            <div class="drag-handle"></div>
            <div class="item-icon">📄</div>
            <div class="item-content" style="flex: 1;">${escHtml(p.title)}</div>
            <a href="/admin/edit?title=${encodeURIComponent(p.title)}" target="_blank" style="text-decoration: none; font-size: 14px; margin-left: 10px;" title="Edit problem">✏️</a>
          </div>`;
        });
        addBtn.textContent = "+ Add new Problem";
        addBtn.style.display = "block";
      }
      
      root.innerHTML = html;

      // Initialize Sortable
      sortableInstance = new Sortable(root, {
        animation: 150,
        handle: '.drag-handle',
        ghostClass: 'sortable-ghost',
        onEnd: function (evt) {
          const oldIdx = evt.oldIndex;
          const newIdx = evt.newIndex;
          if (oldIdx === newIdx) return;
          
          if (currentStepIndex === null) {
            const moved = tree.splice(oldIdx, 1)[0];
            tree.splice(newIdx, 0, moved);
          } else if (currentLectureIndex === null) {
            const lecs = tree[currentStepIndex].lectures;
            const moved = lecs.splice(oldIdx, 1)[0];
            lecs.splice(newIdx, 0, moved);
          } else {
            const probs = tree[currentStepIndex].lectures[currentLectureIndex].problems;
            const moved = probs.splice(oldIdx, 1)[0];
            probs.splice(newIdx, 0, moved);
          }
        }
      });
    }

    async function saveOrder() {
      const btn = document.querySelector('.save-btn');
      const msg = document.getElementById('statusMessage');
      btn.disabled = true;
      btn.textContent = "Saving...";
      
      const payload = {};
      let currentOrder = 1;
      
      // Flatten the tree to generate sequential orders
      for (const s of tree) {
        for (const l of s.lectures) {
          for (const p of l.problems) {
            if (p.id) {
              payload[p.id] = currentOrder++;
            }
          }
        }
      }
      
      try {
        const res = await fetch('/api/reorder', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (res.ok) {
          msg.textContent = "Order saved successfully!";
          setTimeout(() => msg.textContent = "", 3000);
        } else {
          msg.textContent = "Failed to save.";
          msg.style.color = "#ee4c2b";
        }
      } catch (err) {
        msg.textContent = "Error saving.";
        msg.style.color = "#ee4c2b";
      } finally {
        btn.disabled = false;
        btn.textContent = "Save New Order";
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadData();
  </script>
</body>
</html>
